<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTime - University Timetable Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            console.log('SW registered: ', registration);
            
            // Check for updates
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              if (installingWorker == null) return;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    console.log('New content is available; please refresh.');
                    // Optionally alert the user or auto-reload
                  } else {
                    console.log('Content is cached for offline use.');
                  }
                }
              };
            };
          }).catch((registrationError) => {
            console.error('SW registration failed: ', registrationError);
          });
        });

        // Safety net: if the app hasn't loaded in 10 seconds, and we have a SW, try unregistering and reloading
        const swTimeout = setTimeout(() => {
          if (!document.getElementById('root').hasChildNodes()) {
            console.warn('App failed to load in time, clearing SW...');
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for(let registration of registrations) {
                registration.unregister();
              }
              window.location.reload();
            });
          }
        }, 10000);

        window.addEventListener('DOMContentLoaded', () => {
          // If the app bootstraps properly, clear the timeout
          // We can't be sure when the app 'bootstraps', but if root has content we are good
          const observer = new MutationObserver(() => {
            if (document.getElementById('root').hasChildNodes()) {
              clearTimeout(swTimeout);
              observer.disconnect();
            }
          });
          observer.observe(document.getElementById('root'), { childList: true });
        });
      }
    </script>
</body>
</html>
